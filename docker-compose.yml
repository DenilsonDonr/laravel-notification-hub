services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: event-driven-notifications-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - event-driven-notifications
    depends_on:
      - postgres

  nginx:
    image: nginx:alpine
    container_name: event-driven-notifications-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - event-driven-notifications
    depends_on:
      - app

  mailpit:
    image: axllent/mailpit:latest
    container_name: event-driven-notifications-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP — donde Laravel envía los emails
      - "8025:8025"  # UI web — donde tú los ves
    networks:
      - event-driven-notifications

  postgres:
    image: postgres:16-alpine
    container_name: event-driven-notifications-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: event-driven-notifications
      POSTGRES_USER: event-driven-notifications_user
      POSTGRES_PASSWORD: secret
      POSTGRES_MULTIPLE_DATABASES: event-driven-notifications,event-driven-notifications_test
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    networks:
      - event-driven-notifications

networks:
  event-driven-notifications:
    driver: bridge

volumes:
  postgres_data:
    driver: local
